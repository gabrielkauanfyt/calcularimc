<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
     <link rel="stylesheet" href="style.css">
</head>
<body>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5369119676434998"
     crossorigin="anonymous"></script>
    <div class="container">
        <h1>Calculadora de IMC</h1>
        <label for="peso">Peso (kg)</label>
        <input type="number" id="peso" placeholder="Ex: 70" min="1" step="0.1">

        <label for="altura">Altura (m)</label>
        <input type="number" id="altura" placeholder="Ex: 1.75" min="0.5" step="0.01">

        <button id="btnCalcular">Calcular IMC</button>

        <div id="resultado">Digite seu peso e altura e clique em calcular.</div>
    </div>

    <script>
        const pesoInput = document.getElementById('peso');
        const alturaInput = document.getElementById('altura');
        const resultado = document.getElementById('resultado');
        const botao = document.getElementById('btnCalcular');

        botao.addEventListener('click', () => {
            const peso = parseFloat(pesoInput.value.replace(',', '.'));
            const altura = parseFloat(alturaInput.value.replace(',', '.'));

            if (!peso || !altura || altura <= 0) {
                resultado.textContent = 'Por favor informe peso e altura válidos.';
                return;
            }

            const imc = peso / (altura * altura);
            const imcFormatado = imc.toFixed(1);
            let categoria = '';

            if (imc < 18.5) categoria = 'Abaixo do peso';
            else if (imc < 25) categoria = 'Peso normal';
            else if (imc < 30) categoria = 'Sobrepeso';
            else if (imc < 35) categoria = 'Obesidade Grau I';
            else if (imc < 40) categoria = 'Obesidade Grau II';
            else categoria = 'Obesidade Grau III';

            resultado.textContent = `Seu IMC é ${imcFormatado} (${categoria}).`;
        });
    </script>
</body>
</html>
